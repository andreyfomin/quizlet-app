services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${DB_NAME:-quizlet}
      POSTGRES_USER: ${DB_USERNAME:-quizlet}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-quizlet}
    ports:
      - "5432:5432"
    volumes:
      - quizlet-postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    depends_on:
      - postgres
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-quizlet}
      DB_USERNAME: ${DB_USERNAME:-quizlet}
      DB_PASSWORD: ${DB_PASSWORD:-quizlet}
      HF_API_TOKEN: ${HF_API_TOKEN}
      HUGGINGFACE_MODEL: ${HUGGINGFACE_MODEL:-meta-llama/Llama-3.1-8B-Instruct}
    ports:
      - "8080:8080"

  slackbot:
    build:
      context: ./slackbot
    depends_on:
      - backend
    environment:
      BACKEND_BASE_URL: http://backend:8080
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET}
    ports:
      - "8081:8081"

volumes:
  quizlet-postgres-data:
